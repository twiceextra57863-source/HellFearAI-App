name: Build HellFearAI (Java 21)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Isse aap manual button daba kar bhi build kar sakte hain

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload HellFearAI APK
        uses: actions/upload-artifact@v4
        with:
          name: HellFearAI-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7 # APK 7 din tak download ke liye available rahega
          
